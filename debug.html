<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextern Deployment Debugger</title>
    <style>
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, Helvetica, Arial, sans-serif; background: #0f172a; color: #f1f5f9; padding: 40px; line-height: 1.6; }
        .card { background: #1e293b; border-radius: 12px; padding: 24px; max-width: 800px; margin: 0 auto; box-shadow: 0 10px 15px -3px rgba(0, 0, 0, 0.1); }
        h1 { margin-top: 0; color: #6366f1; font-size: 24px; }
        .status { padding: 12px; border-radius: 8px; margin-bottom: 20px; font-weight: bold; }
        .status.wait { background: #334155; color: #94a3b8; }
        .status.ok { background: #065f46; color: #34d399; }
        .status.error { background: #7f1d1d; color: #f87171; }
        .log { background: #000; color: #00ff00; padding: 15px; border-radius: 6px; font-family: 'Courier New', Courier, monospace; font-size: 13px; height: 300px; overflow-y: auto; white-space: pre-wrap; }
        .btn { display: inline-block; background: #6366f1; color: white; padding: 12px 24px; border-radius: 8px; text-decoration: none; font-weight: bold; cursor: pointer; border: none; margin-top: 20px; }
        .btn:hover { background: #4f46e5; }
        input { background: #334155; border: 1px solid #475569; color: white; padding: 10px; border-radius: 6px; width: 100%; box-sizing: border-box; margin-bottom: 10px; }
        label { display: block; margin-bottom: 5px; font-size: 14px; color: #94a3b8; }
    </style>
</head>
<body>

<div class="card">
    <h1>🚀 Nextern Backend Connectivity Debugger</h1>
    <p>This tool helps you verify if your Vercel frontend can talk to your Railway backend.</p>

    <div id="summary" class="status wait">Ready to test...</div>

    <label for="apiUrl">Railway API URL:</label>
    <input type="text" id="apiUrl" placeholder="https://nextern-api.up.railway.app">
    
    <label for="token">JWT Token (Optional - from localStorage):</label>
    <input type="text" id="token" placeholder="Optional: Paste nextern_token here">

    <button class="btn" onclick="runDiagnostics()">Start Diagnostics</button>

    <div style="margin-top: 20px;">
        <label>Diagnostic Logs:</label>
        <div id="log" class="log">Click "Start Diagnostics" to begin...</div>
    </div>
</div>

<script src="js/config.js"></script>
<script>
    const logEl = document.getElementById('log');
    const summaryEl = document.getElementById('summary');
    const apiInput = document.getElementById('apiUrl');
    const tokenInput = document.getElementById('token');

    // Pre-fill with detected config
    apiInput.value = window.API_BASE || 'https://nextern-api.up.railway.app';
    tokenInput.value = localStorage.getItem('nextern_token') || '';

    function log(msg, type = 'info') {
        const time = new Date().toLocaleTimeString();
        let color = '#fff';
        if (type === 'ok') color = '#34d399';
        if (type === 'error') color = '#f87171';
        if (type === 'warn') color = '#fbbf24';
        
        logEl.innerHTML += `[${time}] <span style="color: ${color}">${msg}</span>\n`;
        logEl.scrollTop = logEl.scrollHeight;
    }

    async function runDiagnostics() {
        logEl.innerHTML = '';
        summaryEl.className = 'status wait';
        summaryEl.textContent = 'Running diagnostics...';
        
        const baseUrl = apiInput.value.trim().replace(/\/$/, '');
        const token = tokenInput.value.trim();

        log(`Starting diagnostics for: ${baseUrl}`);
        log(`Client Origin: ${window.location.origin}`);

        // 1. Basic URL Validation
        if (!baseUrl.startsWith('http')) {
            log(`Error: URL must start with http or https`, 'error');
            summaryEl.className = 'status error';
            summaryEl.textContent = 'Invalid URL';
            return;
        }

        // 2. Health Check (CORS Open)
        log(`Test 1: Fetching /api/health...`);
        try {
            const start = Date.now();
            const res = await fetch(`${baseUrl}/api/health`, { method: 'GET' });
            const duration = Date.now() - start;
            
            if (res.ok) {
                const data = await res.json();
                log(`Success! API responded in ${duration}ms`, 'ok');
                log(`Server Response: ${JSON.stringify(data)}`, 'ok');
            } else {
                log(`Failed: API returned status ${res.status}`, 'error');
                if (res.status === 404) log(`Hint: The /api/health route might not be defined on this URL.`, 'warn');
            }
        } catch (err) {
            log(`Critical Error: Could not reach backend!`, 'error');
            log(`System Message: ${err.message}`, 'error');
            log(`Causes:`, 'warn');
            log(`1. The Railway app is crashed or not running.`);
            log(`2. MONGO_URI is missing in Railway variables (check logs).`);
            log(`3. CORS is blocking this request from ${window.location.origin}.`);
            summaryEl.className = 'status error';
            summaryEl.textContent = 'Connection Failed';
            return;
        }

        // 3. Test Database Route (Auth Protected)
        log(`Test 2: Fetching /api/drives (Requires DB + Auth)...`);
        try {
            const headers = token ? { 'Authorization': `Bearer ${token}` } : {};
            const res = await fetch(`${baseUrl}/api/drives`, { headers });
            
            if (res.ok) {
                const data = await res.json();
                log(`Success! Database is connected and drives fetched.`, 'ok');
                log(`Drives found: ${data.drives?.length || 0}`, 'ok');
                summaryEl.className = 'status ok';
                summaryEl.textContent = 'Connection Perfect!';
            } else if (res.status === 401) {
                log(`Auth Check: Server responded with 401 Unauthorized.`, 'ok');
                log(`This is GOOD! It means the server IS alive and protecting routes.`, 'ok');
                log(`Your issue is likely just the API_BASE URL in config.js or a login timeout.`, 'info');
                summaryEl.className = 'status ok';
                summaryEl.textContent = 'Server is Alive (Auth Protected)';
            } else if (res.status === 500) {
                log(`Database Error: Server returned 500 Internal Server Error.`, 'error');
                log(`Hint: Look at Railway Logs. Your MONGO_URI is likely failing to connect.`, 'warn');
                summaryEl.className = 'status error';
                summaryEl.textContent = 'Database Error (500)';
            } else {
                log(`Unexpected Status: ${res.status}`, 'warn');
            }
        } catch (err) {
            log(`Error fetching drives: ${err.message}`, 'error');
        }

        log(`Diagnostics complete.`);
    }
</script>

</body>
</html>
