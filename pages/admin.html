<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NexConsole — Administrative Control</title>
    
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800&family=Syne:wght@700;800&display=swap" rel="stylesheet">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    
    <style>
        :root {
            --bg-deep: #08090a;
            --bg-surface: #111214;
            --bg-card: #161719;
            --primary: #6366f1;
            --primary-hover: #4f46e5;
            --text-main: #f1f5f9;
            --text-muted: #64748b;
            --border: rgba(255, 255, 255, 0.05);
            --sidebar-width: 260px;
            --radius: 12px;
            --shadow-sm: 0 1px 2px rgba(0,0,0,0.5);
            --accent-green: #10b981;
            --accent-red: #ef4444;
            --accent-yellow: #f59e0b;
        }

        * { margin: 0; padding: 0; box-sizing: border-box; -webkit-font-smoothing: antialiased; }
        body { 
            font-family: 'Inter', sans-serif; 
            background: var(--bg-deep); 
            color: var(--text-main);
            display: grid;
            grid-template-columns: var(--sidebar-width) 1fr;
            height: 100vh;
            overflow: hidden;
        }

        /* ── SIDEBAR ── */
        .sidebar {
            background: var(--bg-surface);
            border-right: 1px solid var(--border);
            padding: 24px 16px;
            display: flex;
            flex-direction: column;
            gap: 32px;
            z-index: 100;
            overflow-y: auto;
        }

        .side-logo {
            padding: 0 12px;
            text-decoration: none;
            display: flex;
            align-items: center;
            gap: 10px;
        }
        .side-logo .logo-text { font-family: 'Syne', sans-serif; font-size: 1.5rem; font-weight: 800; color: white; }
        .side-logo .logo-text span { color: var(--primary); }
        .side-logo .badge { background: rgba(99, 102, 241, 0.2); color: var(--primary); font-size: 0.65rem; padding: 2px 6px; border-radius: 4px; font-weight: 700; text-transform: uppercase; }

        .side-group-label { font-size: 0.7rem; font-weight: 800; color: var(--text-muted); text-transform: uppercase; letter-spacing: 0.1em; padding-left: 12px; margin-bottom: 12px; }

        .side-nav { display: flex; flex-direction: column; gap: 4px; }
        .nav-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 14px;
            text-decoration: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            font-weight: 500;
            border-radius: 8px;
            transition: all 0.2s;
        }
        .nav-item:hover { color: white; background: rgba(255,255,255,0.03); }
        .nav-item.active { color: white; background: rgba(255,255,255,0.08); }
        .nav-item svg { width: 18px; height: 18px; opacity: 0.7; }

        .aside-footer { margin-top: auto; padding-top: 24px; border-top: 1px solid var(--border); display: flex; flex-direction: column; gap: 12px; }
        .admin-profile-pill { background: rgba(255,255,255,0.03); padding: 12px; border-radius: 12px; display: flex; flex-direction: column; gap: 2px; }
        .admin-profile-pill span { font-size: 0.7rem; color: var(--text-muted); }
        .admin-profile-pill b { font-size: 0.85rem; color: white; }

        /* ── MAIN AREA ── */
        .main-container {
            display: flex;
            flex-direction: column;
            overflow-y: auto;
        }

        .top-header {
            height: 64px;
            padding: 0 40px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            background: rgba(8, 9, 10, 0.8);
            backdrop-filter: blur(8px);
            position: sticky;
            top: 0;
            z-index: 90;
        }
        .header-title { font-size: 0.9rem; color: var(--text-muted); font-weight: 500; }
        .header-title b { color: white; font-size: 1.1rem; display: block; font-family: 'Inter'; font-weight: 700; margin-top: 2px; }

        .header-actions { display: flex; align-items: center; gap: 16px; }
        .btn-action { background: rgba(255,255,255,0.05); color: white; border: 1px solid var(--border); padding: 8px 16px; border-radius: 8px; font-size: 0.85rem; font-weight: 600; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .btn-action:hover { background: rgba(255,255,255,0.1); }
        .btn-primary { background: var(--primary); border: none; }
        .btn-primary:hover { background: var(--primary-hover); }

        .view-frame { padding: 40px; width: 100%; max-width: 1600px; margin: 0 auto; }

        /* ── DASHBOARD UI ── */
        .kpi-grid { display: grid; grid-template-columns: repeat(4, 1fr); gap: 24px; margin-bottom: 32px; }
        .kpi-card { background: var(--bg-card); padding: 24px; border-radius: var(--radius); border: 1px solid var(--border); }
        .kpi-card .label { font-size: 0.75rem; font-weight: 700; color: var(--text-muted); text-transform: uppercase; margin-bottom: 12px; }
        .kpi-card .value { font-size: 2.25rem; font-weight: 800; margin-bottom: 4px; }
        .kpi-card .sub { font-size: 0.75rem; color: var(--text-muted); }

        .content-grid { display: grid; grid-template-columns: 2fr 1fr; gap: 24px; box-sizing: border-box; }
        .card { background: var(--bg-card); border-radius: var(--radius); border: 1px solid var(--border); padding: 24px; position: relative; }
        .card h3 { font-size: 1.1rem; font-weight: 700; margin-bottom: 24px; display: flex; align-items: center; gap: 10px; }

        .data-table { width: 100%; border-collapse: collapse; margin-top: 12px; }
        .data-table th { text-align: left; padding: 12px 16px; color: var(--text-muted); font-size: 0.75rem; text-transform: uppercase; border-bottom: 1px solid var(--border); }
        .data-table td { padding: 16px; border-bottom: 1px solid var(--border); font-size: 0.85rem; color: var(--text-muted); }
        .data-table tr:last-child td { border-bottom: none; }
        .data-table tr td:first-child { color: white; font-weight: 600; }

        .attention-item { display: flex; justify-content: space-between; align-items: center; background: rgba(255,255,255,0.02); padding: 16px; border-radius: 12px; margin-bottom: 12px; border: 1px solid rgba(255,255,255,0.03); }
        .attention-item .count { font-size: 1.5rem; font-weight: 800; color: var(--accent-yellow); }
        .attention-label b { display: block; font-size: 0.9rem; }
        .attention-label span { font-size: 0.7rem; color: var(--text-muted); }

        /* ── ANNOUNCEMENTS UI ── */
        .announcement-form { display: flex; flex-direction: column; gap: 16px; }
        .input-group { display: flex; flex-direction: column; gap: 6px; }
        .input-group label { font-size: 0.85rem; font-weight: 600; color: var(--text-muted); }
        .input-text, .input-area, .input-select { background: #1a1b1d; border: 1px solid var(--border); border-radius: 8px; padding: 12px; color: white; outline: none; font-size: 0.9rem; }
        .input-area { min-height: 120px; resize: vertical; }

        .multi-select-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 8px; margin-top: 4px; }
        .check-pill { background: #1a1b1d; border: 1px solid var(--border); padding: 8px 12px; border-radius: 6px; font-size: 0.8rem; cursor: pointer; display: flex; align-items: center; gap: 8px; transition: 0.2s; }
        .check-pill.active { background: var(--primary); border-color: var(--primary); }
        .check-pill input { display: none; }

        @media (max-width: 1024px) {
            body { grid-template-columns: 1fr; }
            .sidebar { display: none; }
        }
    </style>
</head>
<body>

    <!-- SIDEBAR -->
    <aside class="sidebar">
        <a href="feed.html" class="side-logo">
            <div class="logo-text">Nex<span>tern</span></div>
            <div class="badge">Admin</div>
        </a>

        <div class="side-menu">
            <div class="side-group">
                <div class="side-group-label">Overview</div>
                <nav class="side-nav">
                    <a href="#" class="nav-item active" data-view="dashboard">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="13" y="3" width="7" height="7"/><rect x="13" y="13" width="7" height="7"/><rect x="3" y="13" width="7" height="7"/></svg>
                        Dashboard
                    </a>
                    <a href="#" class="nav-item" data-view="analytics">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 20V10M12 20V4M6 20v-6"/></svg>
                        Analytics
                    </a>
                </nav>
            </div>

            <div class="side-group" style="margin-top:24px;">
                <div class="side-group-label">Manage</div>
                <nav class="side-nav">
                    <a href="#" class="nav-item" data-view="students">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 00-4-4H5a4 4 0 00-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 00-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                        Students
                    </a>
                    <a href="#" class="nav-item" data-view="drives">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 00-2-2h-4a2 2 0 00-2 2v16"/></svg>
                        Drives
                    </a>
                    <a href="#" class="nav-item" data-view="feed">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 15a2 2 0 01-2 2H7l-4 4V5a2 2 0 012-2h14a2 2 0 012 2z"/></svg>
                        Feed Posts
                    </a>
                    <a href="#" class="nav-item" data-view="resources">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M4 19.5A2.5 2.5 0 016.5 17H20"/><path d="M6.5 2H20v20H6.5A2.5 2.5 0 014 19.5v-15A2.5 2.5 0 016.5 2z"/></svg>
                        Resources
                    </a>
                </nav>
            </div>

            <div class="side-group" style="margin-top:24px;">
                <div class="side-group-label">Communication</div>
                <nav class="side-nav">
                    <a href="#" class="nav-item" data-view="announcements">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 006 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 01-3.46 0"/></svg>
                        Announcements
                    </a>
                    <a href="#" class="nav-item" data-view="notifications">
                        <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="11" width="18" height="10" rx="2"/><circle cx="12" cy="5" r="2"/><path d="M12 7v4M8 7l1.5 1.5M16 7l-1.5 1.5"/></svg>
                        Notifications
                    </a>
                </nav>
            </div>
        </div>

        <div class="aside-footer">
            <div class="admin-profile-pill">
                <span>Signed in as</span>
                <b id="adminNameDisplay">Garudkar</b>
            </div>
            <a href="feed.html" class="nav-item" style="color:var(--accent-red)">
                <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 01-2-2V5a2 2 0 012-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                Back to App
            </a>
        </div>
    </aside>

    <!-- MAIN WINDOW -->
    <main class="main-container">
        <header class="top-header">
            <div class="header-title">
                Admin Console
                <b id="currentViewTitle">Dashboard</b>
            </div>

            <div class="header-actions">
                <button class="btn-action" onclick="syncDrives()">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><path d="M23 4v6h-6M1 20v-6h6M3.51 9a9 9 0 0114.85-3.36L23 10M1 14l4.64 4.36A9 9 0 0020.49 15"/></svg>
                    Sync Drives
                </button>
                <button class="btn-action btn-primary" onclick="switchView('add-drive')">
                    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3"><line x1="12" y1="5" x2="12" y2="19"/><line x1="5" y1="12" x2="19" y2="12"/></svg>
                    Add Drive
                </button>
            </div>
        </header>

        <div id="view-container" class="view-frame">
            <!-- Content Injected via JS -->
            <div style="display:flex; justify-content:center; align-items:center; height:300px; color:var(--text-muted);">
                Initializing NexConsole...
            </div>
        </div>
    </main>

    <!-- JS -->
    <script src="../js/config.js"></script>
    <script src="../js/admin-saas.js"></script>
    <script>
        // Token expiry pre-check
        (function() {
            var token = localStorage.getItem('nextern_token');
            if (!token) { window.location.href = '../login.html'; return; }
            try {
                var payload = JSON.parse(atob(token.split('.')[1]));
                if (payload.exp * 1000 < Date.now()) {
                    localStorage.clear();
                    window.location.href = '../login.html';
                }
            } catch(e) { localStorage.clear(); window.location.href = '../login.html'; }
        })();

        // Full admin role verification via API
        async function verifyAdmin() {
            const token = localStorage.getItem('nextern_token');
            if (!token) { window.location.href = '../login.html'; return false; }

            try {
                const res = await fetch((window.API_BASE || 'https://nextern-production.up.railway.app') + '/api/user/me', {
                    headers: { 'Authorization': 'Bearer ' + token }
                });
                const data = await res.json();

                if (!data.success || !data.user || data.user.role !== 'admin') {
                    showToast('Access denied. Admins only.', 'error');
                    setTimeout(() => { window.location.href = 'feed.html'; }, 1500);
                    return false;
                }

                const name = (data.user.firstName || '') + ' ' + (data.user.lastName || '');
                const el = document.getElementById('adminNameDisplay');
                if (el) el.textContent = data.user.lastName || data.user.firstName || 'Admin';
                return true;

            } catch(e) {
                window.location.href = '../login.html';
                return false;
            }
        }
    </script>
</body>
</html>
