<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Nextern Pro — Admin Dashboard</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap" rel="stylesheet">
    <!-- Charts -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Styles -->
    <link rel="stylesheet" href="../css/dark-mode.css">
    <link rel="stylesheet" href="../css/admin-saas.css">
    <script src="../js/theme.js"></script>
</head>
<body data-theme="dark">

    <div class="admin-shell">
        <!-- FIXED SIDEBAR -->
        <aside class="aside">
            <div class="aside-logo">
                <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="3" style="color:var(--brand)"><circle cx="12" cy="12" r="10"/><path d="M12 8v8M8 12h8"/></svg>
                NEXTERN<span>.PRO</span>
            </div>

            <nav class="aside-nav">
                <a href="#" class="nav-item active" data-view="dashboard">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="3" y="3" width="7" height="7"/><rect x="14" y="3" width="7" height="7"/><rect x="14" y="14" width="7" height="7"/><rect x="3" y="14" width="7" height="7"/></svg>
                    Dashboard
                </a>
                <a href="#" class="nav-item" data-view="students">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M17 21v-2a4 4 0 0 0-4-4H5a4 4 0 0 0-4 4v2"/><circle cx="9" cy="7" r="4"/><path d="M23 21v-2a4 4 0 0 0-3-3.87"/><path d="M16 3.13a4 4 0 0 1 0 7.75"/></svg>
                    Students
                </a>
                <a href="#" class="nav-item" data-view="drives">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><rect x="2" y="7" width="20" height="14" rx="2" ry="2"/><path d="M16 21V5a2 2 0 0 0-2-2h-4a2 2 0 0 0-2 2v16"/></svg>
                    Placement Drives
                </a>
                <a href="#" class="nav-item" data-view="ats">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M2 3h6a4 4 0 0 1 4 4v14a3 3 0 0 0-3-3H2z"/><path d="M22 3h-6a4 4 0 0 0-4 4v14a3 3 0 0 1 3-3h7z"/></svg>
                    Applications / ATS
                </a>
                <a href="#" class="nav-item" data-view="announcements">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M18 8A6 6 0 0 0 6 8c0 7-3 9-3 9h18s-3-2-3-9"/><path d="M13.73 21a2 2 0 0 1-3.46 0"/></svg>
                    Announcements
                </a>
                <a href="#" class="nav-item" data-view="logs">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M14 2H6a2 2 0 0 0-2 2v16a2 2 0 0 0 2 2h12a2 2 0 0 0 2-2V8z"/><polyline points="14 2 14 8 20 8"/><line x1="16" y1="13" x2="8" y2="13"/><line x1="16" y1="17" x2="8" y2="17"/><polyline points="10 9 9 9 8 9"/></svg>
                    Activity Logs
                </a>
            </nav>

            <div class="aside-footer" style="margin-top: auto; padding-top: 20px; border-top: 1px solid var(--border);">
                <a href="../login.html" class="nav-item" onclick="localStorage.clear()" style="color:var(--error)">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"/><polyline points="16 17 21 12 16 7"/><line x1="21" y1="12" x2="9" y2="12"/></svg>
                    Sign Out
                </a>
            </div>
        </aside>

        <!-- MAIN WINDOW -->
        <main class="main">
            <header class="top-bar">
                <div class="search-field">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><circle cx="11" cy="11" r="8"/><line x1="21" y1="21" x2="16.65" y2="16.65"/></svg>
                    <input type="text" id="globalSearch" placeholder="Search students, drives, or logs...">
                </div>

                <div style="display: flex; align-items: center; gap: 20px;">
                    <button class="theme-toggle-btn" onclick="window.toggleTheme()">
                        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2"><path d="M21 12.79A9 9 0 1 1 11.21 3 7 7 0 0 0 21 12.79z"/></svg>
                    </button>
                    <div style="width:1px; height:24px; background:var(--border);"></div>
                    <div style="display:flex; align-items:center; gap:12px;">
                        <div style="text-align:right;">
                            <div style="font-weight:700; font-size:0.9rem; color:white;" id="adminName">Admin User</div>
                            <div style="font-size:0.7rem; color:var(--slate-500);">Placement Head</div>
                        </div>
                        <div style="width:40px; height:40px; border-radius:12px; background:var(--brand); display:flex; align-items:center; justify-content:center; font-weight:800; color:white;">A</div>
                    </div>
                </div>
            </header>

            <!-- DYNAMIC VIEW CONTAINER -->
            <div id="view-container">
                <!-- Content injected by admin-saas.js -->
                <div style="display:flex; justify-content:center; align-items:center; height:400px; color:var(--slate-500);">
                    Initializing Dash Pulse...
                </div>
            </div>
        </main>
    </div>

    <!-- SCRIPTS -->
    <script src="../js/config.js"></script>
    <script>
        // Ensure only admins can see this
        const user = JSON.parse(localStorage.getItem('nextern_user') || '{}');
        if (user.role !== 'admin') {
            alert('Restricted Access');
            window.location.href = 'feed.html';
        }
        document.getElementById('adminName').textContent = `${user.firstName || 'Admin'} ${user.lastName || ''}`;
    </script>
    <script src="../js/admin-saas.js"></script>
</body>
</html>
