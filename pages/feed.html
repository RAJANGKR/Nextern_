<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Home — Nextern</title>
    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Syne:wght@800&display=swap"
        rel="stylesheet" />

    <style>
        :root {
            /* Palette */
            --accent: #6C63FF;
            --accent-soft: #EEF2FF;
            --bg-body: #F5F6FA;
            --bg-white: #FFFFFF;
            --border: #E2E8F0;
            --text-dark: #0F172A;
            --text-gray: #64748B;
            --text-muted: #94A3B8;
            --red: #EF4444;
            --green: #22C55E;

            /* Sizing & Radius */
            --radius-md: 12px;
            --radius-pill: 100px;
            --nav-height: 60px;
            --sidebar-w: 220px;
            --right-panel-w: 280px;

            /* Shadow */
            --shadow-sm: 0 1px 3px rgba(0, 0, 0, 0.05);
            --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.05);
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-body);
            color: var(--text-dark);
            min-height: 100vh;
            line-height: 1.5;
        }

        a {
            text-decoration: none;
            color: inherit;
        }

        button {
            font-family: inherit;
            cursor: pointer;
            border: none;
            background: none;
            transition: all 0.2s;
        }

        /* ── TOP NAVBAR ── */
        .topnav {
            position: sticky;
            top: 0;
            z-index: 1000;
            height: 56px;
            background: white;
            border-bottom: 1px solid #E2E8F0;
            display: flex;
            align-items: center;
            padding: 0 20px;
            gap: 16px;
        }

        .nav-logo {
            text-decoration: none;
            font-family: 'Syne', sans-serif;
            font-weight: 800;
            font-size: 1.4rem;
            display: flex;
            align-items: center;
            gap: 2px;
        }

        .nav-search {
            flex: 1;
            max-width: 400px;
            display: flex;
            align-items: center;
            background: #F8FAFC;
            border: 1px solid #E2E8F0;
            border-radius: 8px;
            padding: 6px 12px;
            gap: 8px;
        }

        .nav-search input {
            border: none;
            background: transparent;
            outline: none;
            width: 100%;
            font-size: 0.9rem;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
            margin-left: auto;
        }

        .nav-right {
            display: flex;
            align-items: center;
            gap: 16px;
        }

        .dark-toggle {
            color: var(--text-gray);
            display: flex;
            align-items: center;
        }

        .nav-avatar {
            width: 32px;
            height: 32px;
            background: var(--accent);
            color: white;
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            font-size: 0.85rem;
        }

        /* ── LAYOUT GRID ── */
        .layout-grid {
            display: grid;
            grid-template-columns: var(--sidebar-width, 220px) 1fr 280px;
            gap: 28px;
            max-width: 1400px;
            margin: calc(var(--nav-height) + 24px) auto 40px;
            padding: 0 24px;
            align-items: start;
            transition: grid-template-columns 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        /* Sidebar mount */
        .sidebar-container {
            position: relative;
            min-width: 0;
        }

        /* ── CENTRE FEED ── */
        .feed-centre {
            display: flex;
            flex-direction: column;
            gap: 20px;
            min-width: 0;
        }

        #feedList {
            display: flex;
            flex-direction: column;
            gap: 16px;
        }

        /* Create Post */
        .create-post {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .cp-top {
            display: flex;
            gap: 12px;
            align-items: center;
            margin-bottom: 16px;
        }

        .cp-avatar {
            width: 40px;
            height: 40px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
        }

        .cp-input {
            flex: 1;
            padding: 12px 16px;
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: var(--radius-pill);
            outline: none;
            font-size: 0.95rem;
            color: var(--text-dark);
        }

        .cp-bottom {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding-top: 12px;
            border-top: 1px solid #F1F5F9;
        }

        .cp-actions {
            display: flex;
            gap: 16px;
        }

        .cp-btn-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-gray);
            font-weight: 500;
        }

        .cp-btn-action:hover {
            color: var(--accent);
        }

        .btn-post {
            background: var(--accent);
            color: white;
            padding: 8px 24px;
            border-radius: var(--radius-pill);
            font-weight: 600;
            font-size: 0.9rem;
        }

        /* Filter Tabs */
        .filter-tabs {
            display: flex;
            gap: 8px;
        }

        .filter-tab {
            padding: 8px 20px;
            border-radius: var(--radius-pill);
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--text-gray);
            background: white;
            box-shadow: var(--shadow-sm);
        }

        .filter-tab.active {
            background: var(--accent);
            color: white;
        }

        /* Post Card */
        .post-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: 0 1px 2px rgba(15, 23, 42, 0.04);
            display: flex;
            flex-direction: column;
            gap: 14px;
            transition: transform 0.14s ease, box-shadow 0.14s ease, border-color 0.14s ease;
        }

        .post-card:hover {
            transform: translateY(-1px);
            border-color: #d7ddea;
            box-shadow: 0 8px 24px rgba(15, 23, 42, 0.08);
        }

        .post-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .post-user {
            display: flex;
            gap: 12px;
            align-items: center;
        }

        .u-avatar {
            width: 38px;
            height: 38px;
            border-radius: 50%;
            background: var(--accent-soft);
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 700;
            color: var(--accent);
        }

        .u-info .u-name {
            font-weight: 700;
            font-size: 0.9rem;
            color: var(--text-dark);
        }

        .u-info .u-meta {
            font-size: 0.75rem;
            color: var(--text-muted);
        }

        .post-type-badge {
            font-size: 0.65rem;
            font-weight: 800;
            text-transform: uppercase;
            letter-spacing: 0.4px;
            padding: 4px 10px;
            border-radius: 999px;
            background: var(--accent-soft);
            color: var(--accent);
        }

        .post-content {
            font-size: 0.95rem;
            color: #334155;
            white-space: pre-wrap;
        }

        /* Drive Box in Post */
        .drive-highlight {
            background: #F8FAFC;
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 16px;
            display: flex;
            align-items: center;
            justify-content: space-between;
        }

        .dh-info .dh-company {
            font-weight: 700;
            font-size: 1rem;
            margin-bottom: 2px;
        }

        .dh-info .dh-role {
            font-size: 0.85rem;
            color: var(--text-gray);
        }

        .dh-pkg {
            font-weight: 700;
            color: var(--green);
            font-size: 0.9rem;
        }

        .btn-apply-small {
            background: var(--accent);
            color: white;
            padding: 6px 16px;
            border-radius: 6px;
            font-size: 0.8rem;
            font-weight: 600;
        }

        .post-footer {
            display: flex;
            align-items: center;
            gap: 20px;
            padding-top: 14px;
            border-top: 1px solid #F1F5F9;
        }

        .post-action {
            display: flex;
            align-items: center;
            gap: 6px;
            font-size: 0.85rem;
            color: var(--text-gray);
            font-weight: 500;
        }

        .post-action:hover {
            color: var(--accent);
        }

        .post-action:disabled {
            opacity: 0.55;
            cursor: not-allowed;
        }

        .post-action.liked {
            color: var(--red);
        }

        /* Skeletons */
        .skeleton {
            background: #E2E8F0;
            background: linear-gradient(90deg, #E2E8F0 25%, #F1F5F9 50%, #E2E8F0 75%);
            background-size: 200% 100%;
            animation: skeleton-pulse 1.5s infinite;
            border-radius: 4px;
        }

        @keyframes skeleton-pulse {
            0% {
                background-position: 200% 0;
            }

            100% {
                background-position: -200% 0;
            }
        }

        .skeleton-card {
            height: 180px;
            background: white;
            border-radius: var(--radius-md);
            padding: 20px;
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        /* ── RIGHT PANEL ── */
        .right-panel {
            display: flex;
            flex-direction: column;
            gap: 20px;
            position: sticky;
            top: calc(var(--nav-height) + 20px);
        }

        .widget-card {
            background: var(--bg-white);
            border-radius: var(--radius-md);
            padding: 20px;
            border: 1px solid var(--border);
            box-shadow: var(--shadow-sm);
        }

        .w-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            margin-bottom: 16px;
        }

        .w-header h3 {
            font-size: 0.95rem;
            font-weight: 700;
        }

        .w-link {
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--accent);
        }

        .drive-item {
            display: flex;
            align-items: center;
            gap: 12px;
            padding: 10px 0;
            border-bottom: 1px solid #F1F5F9;
        }

        .drive-item:last-child {
            border-bottom: none;
        }

        .co-badge {
            width: 36px;
            height: 36px;
            background: var(--accent-soft);
            color: var(--accent);
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 800;
            font-size: 0.9rem;
        }

        .di-info {
            flex: 1;
            min-width: 0;
        }

        .di-name {
            font-weight: 600;
            font-size: 0.85rem;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .di-role {
            font-size: 0.75rem;
            color: var(--text-muted);
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .di-days {
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--red);
            background: #FEF2F2;
            padding: 2px 6px;
            border-radius: 4px;
        }

        /* Roadmap Widget */
        .roadmap-summary {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .rs-company {
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--text-dark);
        }

        .rs-progress {
            background: #F1F5F9;
            height: 6px;
            border-radius: 10px;
            overflow: hidden;
        }

        .rs-bar {
            height: 100%;
            background: var(--accent);
            width: 0%;
            transition: width 1s ease;
        }

        .rs-phases {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 4px;
            margin-top: 4px;
        }

        .p-dot {
            height: 4px;
            background: #E2E8F0;
            border-radius: 2px;
        }

        .p-dot.done {
            background: var(--accent);
        }

        .error-state {
            text-align: center;
            padding: 40px;
            background: white;
            border-radius: var(--radius-md);
        }

        .btn-retry {
            margin-top: 12px;
            background: var(--accent);
            color: white;
            padding: 8px 20px;
            border-radius: var(--radius-pill);
        }

        .is-hidden {
            display: none;
        }
    </style>
    <script src="../js/theme.js"></script>
    <link rel="stylesheet" href="../css/dark-mode.css">
</head>

    <script>
        const API_BASE = window.API_BASE || 'http://localhost:4000';
        let currentTab = 'all';
        let allPosts = [];

        /* ── INITIALIZE ── */
        function init() {
            setUserInfo();
            loadFeed();
            loadSidebarDrives();
            loadRoadmapSummary();
            setupFilterTabs();
        }

        function setUserInfo() {
            const name = localStorage.getItem('nextern_name') || 'Student User';
            const initial = name.charAt(0).toUpperCase();
            document.getElementById('navAvatar').textContent = initial;
            document.getElementById('cpAvatar').textContent = initial;
        }

        /* ── FEED LOGIC ── */
        async function loadFeed() {
            const feedList = document.getElementById('feedList');
            const emptyState = document.getElementById('emptyState');
            const errorState = document.getElementById('errorState');

            errorState.classList.add('is-hidden');
            emptyState.classList.add('is-hidden');

            try {
                const response = await fetch(`${API_BASE}/api/posts`, {
                    headers: window.getAuthHeaders()
                });
                const data = await response.json();

                if (data.success) {
                    const apiPosts = Array.isArray(data.posts) ? data.posts : [];
                    allPosts = withDiverseDemoPosts(apiPosts);
                    if (allPosts.length === 0) {
                        feedList.innerHTML = '';
                        emptyState.classList.remove('is-hidden');
                    } else {
                        renderPosts(allPosts);
                    }
                } else {
                    throw new Error(data.message);
                }
            } catch (err) {
                console.error('Feed error:', err);
                allPosts = withDiverseDemoPosts([]);
                if (allPosts.length) {
                    renderPosts(allPosts);
                    return;
                }
                feedList.innerHTML = '';
                errorState.classList.remove('is-hidden');
            }
        }

        function renderPosts(posts) {
            const container = document.getElementById('feedList');
            const emptyState = document.getElementById('emptyState');
            if (!container) return;

            const filtered = posts.filter((p) => {
                if (currentTab === 'all') return true;
                if (currentTab === 'peer') return p.type === 'general' || p.type === 'announcement';
                return p.type === currentTab;
            });

            if (filtered.length === 0) {
                container.innerHTML = '';
                if (emptyState) emptyState.classList.remove('is-hidden');
                return;
            } else {
                if (emptyState) emptyState.classList.add('is-hidden');
            }

            container.innerHTML = filtered.map(post => {
                const author = post.author || { firstName: 'Nextern', lastName: 'Admin' };
                const timeStr = timeAgo(new Date(post.createdAt));
                const likes = Array.isArray(post.likes) ? post.likes : [];
                const currentUserId = window.getUserId ? window.getUserId() : null;
                const isLiked = currentUserId ? likes.some(id => String(id) === String(currentUserId)) : false;
                const postId = post._id || post.id || '';
                const isDemoPost = String(postId).startsWith('demo-');
                const firstName = author.firstName || 'Nextern';
                const lastName = author.lastName || 'Team';
                const type = post.type || 'general';

                let driveHTML = '';
                const driveDetails = post.driveDetails || post.meta;
                if (type === 'drive' && driveDetails && driveDetails.company) {
                    const d = driveDetails;
                    driveHTML = `
                        <div class="drive-highlight">
                            <div class="dh-info">
                                <div class="dh-company">${escapeHtml(d.company || '')}</div>
                                <div class="dh-role">${escapeHtml(d.role || 'Role details available')}</div>
                            </div>
                            <div class="dh-pkg">${d.package ? escapeHtml(d.package) : ''}</div>
                            <a href="drives.html" class="btn-apply-small">Apply</a>
                        </div>
                    `;
                }

                return `
                    <article class="post-card post-type-${type}">
                        <div class="post-header">
                            <div class="post-user">
                                <div class="u-avatar">${firstName.charAt(0).toUpperCase()}</div>
                                <div class="u-info">
                                    <div class="u-name">${escapeHtml(firstName)} ${escapeHtml(lastName)}</div>
                                    <div class="u-meta">${timeStr}</div>
                                </div>
                            </div>
                            <span class="post-type-badge">${escapeHtml(type)}</span>
                        </div>
                        
                        <div class="post-content">${escapeHtml(post.content || '')}</div>
                        
                        ${driveHTML}

                        <div class="post-footer">
                            <button class="post-action ${isLiked ? 'liked' : ''}" ${isDemoPost ? 'disabled title="Demo post"' : `onclick="likePost('${postId}', this)"`}>
                                <svg xmlns="http://www.w3.org/2000/svg" fill="${isLiked ? 'currentColor' : 'none'}" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M21 8.25c0-2.485-2.099-4.5-4.688-4.5-1.935 0-3.597 1.126-4.312 2.733-.715-1.607-2.377-2.733-4.313-2.733C5.1 3.75 3 5.765 3 8.25c0 7.22 9 12 9 12s9-4.78 9-12z" />
                                </svg>
                                <span class="like-count">${typeof post.likeCount === 'number' ? post.likeCount : likes.length}</span>
                            </button>
                            <button class="post-action">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M12 20.25c4.97 0 9-3.694 9-8.25s-4.03-8.25-9-8.25S3 7.444 3 12c0 2.104.859 4.023 2.273 5.48L4.32 20.52a.45.45 0 00.67.54l1.902-1.27c1.31.29 2.69.46 4.108.46z" />
                                </svg>
                                Comment
                            </button>
                            <button class="post-action">
                                <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke-width="1.5" stroke="currentColor" style="width:18px;">
                                    <path stroke-linecap="round" stroke-linejoin="round" d="M7.217 10.907a2.25 2.25 0 100 2.186m0-2.186c.18.324.283.696.283 1.093s-.103.77-.283 1.093m0-2.186l9.566-5.314m-9.566 7.5l9.566 5.314" />
                                </svg>
                                Share
                            </button>
                        </div>
                    </article>
                `;
            }).join('');
        }

        async function likePost(id, btn) {
            try {
                const response = await fetch(`${API_BASE}/api/posts/${id}/like`, {
                    method: 'POST',
                    headers: window.getAuthHeaders()
                });
                const data = await response.json();
                if (data.success) {
                    const countSpan = btn.querySelector('.like-count');
                    const svg = btn.querySelector('svg');
                    const likedNow = data.liked ?? data.isLiked;
                    const likeCount = data.likes ?? data.likeCount ?? 0;
                    if (likedNow) {
                        btn.classList.add('liked');
                        svg.setAttribute('fill', 'currentColor');
                    } else {
                        btn.classList.remove('liked');
                        svg.setAttribute('fill', 'none');
                    }
                    countSpan.textContent = likeCount;
                }
            } catch (err) { console.error('Like error:', err); }
        }

        /* ── SIDEBAR WIDGETS ── */
        async function loadSidebarDrives() {
            try {
                const res = await fetch(`${API_BASE}/api/drives`, {
                    headers: window.getAuthHeaders()
                });
                const data = await res.json();
                if (data.success) {
                    const sorted = data.drives.slice(0, 4);
                    const container = document.getElementById('sideDrivesList');
                    container.innerHTML = sorted.map(d => {
                        const daysLeft = Math.ceil((new Date(d.deadline) - new Date()) / (1000 * 60 * 60 * 24));
                        return `
                            <div class="drive-item">
                                <div class="co-badge">${d.company[0]}</div>
                                <div class="di-info">
                                    <div class="di-name">${d.company}</div>
                                    <div class="di-role">${d.role}</div>
                                </div>
                                <div class="di-days">${daysLeft > 0 ? daysLeft + 'd' : 'Closed'}</div>
                            </div>
                        `;
                    }).join('');
                }
            } catch (err) { console.error('Sidebar drives error:', err); }
        }

        function loadRoadmapSummary() {
            const raw = localStorage.getItem('nextern_roadmap');
            if (raw) {
                const roadmap = JSON.parse(raw);
                document.getElementById('rsTarget').textContent = roadmap.company || 'Dream Company';

                // Calculate total progress
                const weeks = roadmap.weeks || [];
                let totalTasks = 0;
                let doneTasks = 0;

                // For logic demo, we look at nextern_task_states
                const taskStates = JSON.parse(localStorage.getItem('nextern_task_states') || '{}');

                weeks.forEach((week, wi) => {
                    totalTasks += week.tasks.length;
                    week.tasks.forEach((t, ti) => {
                        if (taskStates[`${wi}-${ti}`]) doneTasks++;
                    });
                });

                const percentage = totalTasks > 0 ? Math.round((doneTasks / totalTasks) * 100) : 0;
                document.getElementById('rsBar').style.width = percentage + '%';

                // Update 4 dots (roughly divided)
                const dots = document.querySelectorAll('.p-dot');
                dots.forEach((dot, i) => {
                    if (percentage >= (i + 1) * 25) dot.classList.add('done');
                });
            }
        }

        /* ── HELPERS ── */
        function setupFilterTabs() {
            document.querySelectorAll('.filter-tab').forEach(btn => {
                btn.addEventListener('click', () => {
                    document.querySelectorAll('.filter-tab').forEach(b => b.classList.remove('active'));
                    btn.classList.add('active');
                    currentTab = btn.dataset.tab;
                    renderPosts(allPosts);
                });
            });
        }

        function withDiverseDemoPosts(apiPosts) {
            const existing = Array.isArray(apiPosts) ? [...apiPosts] : [];
            const contentKeys = new Set(existing.map((p) => (p.content || '').toLowerCase().trim()).filter(Boolean));
            const targetCount = 5;
            if (existing.length >= targetCount && contentKeys.size >= 4) return existing;

            const demoAuthors = [
                { firstName: 'Aditi', lastName: 'Sharma' },
                { firstName: 'Rohan', lastName: 'Mehta' },
                { firstName: 'Priya', lastName: 'Nair' },
                { firstName: 'Kabir', lastName: 'Singh' },
                { firstName: 'Neha', lastName: 'Verma' },
            ];
            const now = Date.now();
            const demoPosts = [
                {
                    _id: 'demo-1',
                    type: 'drive',
                    author: demoAuthors[0],
                    createdAt: new Date(now - 1000 * 60 * 15).toISOString(),
                    content: 'Google opened SDE Intern applications for 2026 batch. Keep your resume ATS-friendly and apply early.',
                    meta: { company: 'Google', role: 'SDE Intern', package: '₹80K/month' },
                    likes: []
                },
                {
                    _id: 'demo-2',
                    type: 'tip',
                    author: demoAuthors[1],
                    createdAt: new Date(now - 1000 * 60 * 45).toISOString(),
                    content: 'Interview tip: answer behavioral questions in STAR format. Prepare 4 stories and reuse them with different angles.',
                    likes: []
                },
                {
                    _id: 'demo-3',
                    type: 'progress',
                    author: demoAuthors[2],
                    createdAt: new Date(now - 1000 * 60 * 90).toISOString(),
                    content: 'Roadmap update: completed Arrays + Binary Search this week and solved 26 medium questions.',
                    likes: []
                },
                {
                    _id: 'demo-4',
                    type: 'announcement',
                    author: demoAuthors[3],
                    createdAt: new Date(now - 1000 * 60 * 150).toISOString(),
                    content: 'Mock interview room opens at 7:00 PM today. Bring one project explanation and one CS fundamental topic.',
                    likes: []
                },
                {
                    _id: 'demo-5',
                    type: 'general',
                    author: demoAuthors[4],
                    createdAt: new Date(now - 1000 * 60 * 210).toISOString(),
                    content: 'Resume tip: quantify impact in every bullet, e.g. "reduced API latency by 35%" instead of generic wording.',
                    likes: []
                },
            ];

            for (const demo of demoPosts) {
                if ((existing.length >= targetCount && contentKeys.size >= 4)) break;
                const key = (demo.content || '').toLowerCase().trim();
                if (contentKeys.has(key)) continue;
                existing.push(demo);
                contentKeys.add(key);
            }
            return existing;
        }

        function escapeHtml(str) {
            return String(str || '')
                .replace(/&/g, '&amp;')
                .replace(/</g, '&lt;')
                .replace(/>/g, '&gt;')
                .replace(/"/g, '&quot;')
                .replace(/'/g, '&#39;');
        }

        function timeAgo(date) {
            const seconds = Math.floor((new Date() - date) / 1000);
            let interval = seconds / 31536000;
            if (interval > 1) return Math.floor(interval) + "y";
            interval = seconds / 2592000;
            if (interval > 1) return Math.floor(interval) + "mo";
            interval = seconds / 86400;
            if (interval > 1) return Math.floor(interval) + "d";
            interval = seconds / 3600;
            if (interval > 1) return Math.floor(interval) + "h";
            interval = seconds / 60;
            if (interval > 1) return Math.floor(interval) + "m";
            return "just now";
        }

        /* Theme Toggle (Visual only for now) */
        const darkToggle = document.getElementById('darkToggle');
        if (darkToggle) {
            darkToggle.addEventListener('click', () => {
                alert("Switching to Dark Mode... (Theme engine update coming soon!)");
            });
        }

        document.addEventListener('DOMContentLoaded', init);
    </script>
